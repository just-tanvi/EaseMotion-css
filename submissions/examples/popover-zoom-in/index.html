<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Zoom-In Popover - EaseMotion</title>
  <meta name="description" content="A production-quality Pure CSS Animated Popover featuring a GPU-accelerated Zoom-In transition and modern SaaS interface styling.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stage">
    <!-- Demo Page Header -->
    <header class="header">
      <div class="badge">
        <span class="badge-dot"></span>
        Pure CSS • Zero JavaScript
      </div>
      <h1 class="title">Zoom-In SaaS Popover</h1>
      <p class="subtitle">Interactive account popover demonstrating a smooth scale & opacity entrance transition</p>
    </header>

    <!-- Interactive Popover Component Container -->
    <div class="popover-wrapper">
      <details class="popover-details">
        <!-- Summary Trigger Button -->
        <summary class="popover-trigger">
          <span class="trigger-avatar-wrapper">
            <img 
              src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=120&q=80" 
              alt="Sarah Connor" 
              class="trigger-avatar" 
              width="36" 
              height="36"
            >
            <span class="online-dot"></span>
          </span>
          <span class="trigger-text">
            <span class="trigger-name">Sarah Connor</span>
            <span class="trigger-org">SkyTech Cloud</span>
          </span>
          <svg class="trigger-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </summary>

        <!-- Popover Content Surface -->
        <div class="popover-card">
          <!-- Arrow pointer -->
          <div class="popover-arrow" aria-hidden="true"></div>

          <!-- User Meta Header -->
          <div class="popover-user-meta">
            <img 
              src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=160&q=80" 
              alt="Sarah Connor" 
              class="user-avatar" 
              width="44" 
              height="44"
            >
            <div class="user-info">
              <div class="user-name-row">
                <span class="user-name">Sarah Connor</span>
                <span class="role-badge">Admin</span>
              </div>
              <span class="user-email">sarah.connor@sky-tech.io</span>
            </div>
          </div>

          <!-- Navigation Links -->
          <nav class="popover-menu" aria-label="User Account Links">
            <a href="#" class="menu-link" onclick="return false;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="menu-icon" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span>Account Settings</span>
            </a>

            <a href="#" class="menu-link" onclick="return false;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="menu-icon" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <line x1="2" y1="10" x2="22" y2="10"></line>
              </svg>
              <span>Team & Billing</span>
              <span class="pro-tag">PRO</span>
            </a>

            <a href="#" class="menu-link" onclick="return false;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="menu-icon" aria-hidden="true">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path>
              </svg>
              <span>API Tokens</span>
            </a>
          </nav>

          <!-- Divider -->
          <div class="popover-divider" aria-hidden="true"></div>

          <!-- Actions -->
          <div class="popover-actions">
            <button type="button" class="btn btn-primary">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
              Upgrade Plan ✨
            </button>
            <button type="button" class="btn btn-secondary">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Sign Out
            </button>
          </div>
        </div>
      </details>
    </div>
  </main>
</body>
</html>
